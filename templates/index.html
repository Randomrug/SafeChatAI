<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeChat AI</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="app-container">

        <div class="header">
            <h1>🛡️ SafeChat AI</h1>
            <p>AI-Powered Toxicity Detection & Moderation</p>
        </div>

        <div id="chat-box" class="chat-box">

            <div class="message ai">
                <div class="bubble">
                    👋 Hello! I'm SafeChat AI. Every message you send will first pass through the moderation model before reaching me.
                </div>
            </div>

        </div>

        <div class="input-area">

            <input
                type="text"
                id="user-input"
                placeholder="Type your message..."
                autocomplete="off"
            >

            <button onclick="sendMessage()">
                Send
            </button>

        </div>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
